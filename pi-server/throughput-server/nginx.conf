server {
    listen 80;
    server_name _;

    # Disable access log for throughput test endpoint to avoid log spam
    access_log off;

    # 50 KB binary test payload — ESP32 probes download this to measure throughput
    location /test_payload.bin {
        root /usr/share/nginx/html;

        # No caching — every download should be a fresh transfer
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Content-Type "application/octet-stream";

        # Allow chunked responses; don't limit send rate
        sendfile on;
        tcp_nopush on;
    }

    # Health check endpoint for Docker healthcheck and monitoring
    location /health {
        root /usr/share/nginx/html;
        default_type text/plain;
        access_log off;
    }

    # Block everything else
    location / {
        return 404;
    }
}
