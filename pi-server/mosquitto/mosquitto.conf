# LabWiFiMon Mosquitto Configuration
# Eclipse Mosquitto 2.x

# =============================================================================
# Listeners
# =============================================================================
listener 1883
protocol mqtt

# =============================================================================
# Security — anonymous access (lab-internal use)
# =============================================================================
allow_anonymous true

# =============================================================================
# Persistence
# =============================================================================
persistence true
persistence_location /mosquitto/data/

# =============================================================================
# Logging
# =============================================================================
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# =============================================================================
# Message settings
# =============================================================================
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 0

# Retain last-will / status messages
retain_available true
