# =============================================================================
# Telegraf Configuration — LabWiFiMon
# Subscribes to MQTT topics from ESP32 probes, parses JSON, writes to InfluxDB 2
# =============================================================================

[global_tags]
  system = "labwifimon"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "2s"
  precision = "1s"
  omit_hostname = true

# =============================================================================
# OUTPUT — InfluxDB 2
# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
  timeout = "5s"
  # Retry on write failures
  max_retry_count = 10
  retry_max_time = "60s"

# =============================================================================
# INPUT — WiFi Quality Metrics  (topic: labwifimon/<probe_id>/metrics)
# =============================================================================
# Expected JSON payload from ESP32:
# {
#   "probe_id":   "probe-01",
#   "timestamp_ms": 1700000000000,
#   "uptime_s":   3600,
#   "wifi": {
#     "rssi_dbm":     -65,
#     "channel":      6,
#     "tx_power_dbm": 20,
#     "ssid":         "LabNet",
#     "bssid":        "AA:BB:CC:DD:EE:FF"
#   },
#   "latency": {
#     "gateway_avg_ms":  2.5,
#     "dns_avg_ms":      10.2,
#     "internet_avg_ms": 25.3,
#     "jitter_ms":       1.2,
#     "samples":         5
#   },
#   "packet_loss": {
#     "percent":  0.0,
#     "sent":     10,
#     "received": 10
#   },
#   "throughput": {
#     "download_kbps": 8500
#   }
# }
# Produces measurement: wifi_metrics
# Fields: wifi_rssi_dbm, wifi_channel, wifi_tx_power_dbm,
#         latency_gateway_avg_ms, latency_dns_avg_ms, latency_internet_avg_ms,
#         latency_jitter_ms, latency_samples,
#         packet_loss_percent, packet_loss_sent, packet_loss_received,
#         throughput_download_kbps, uptime_s
# Tags:   probe_id (from topic segment), ssid
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics   = ["labwifimon/+/metrics"]
  qos      = 0
  client_id           = "telegraf-metrics"
  connection_timeout  = "30s"
  persistent_session  = false
  data_format = "json_v2"

  # Extract probe_id from the middle topic segment: labwifimon/<probe_id>/metrics
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "labwifimon/+/metrics"
    tags  = "_/probe_id/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "wifi_metrics"
    # Uncomment if probes have NTP sync; otherwise telegraf uses arrival time
    # timestamp_path   = "timestamp_ms"
    # timestamp_format = "unix_ms"

    # probe_id from JSON (belt-and-suspenders with topic_parsing above)
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "probe_id"

    # SSID as a tag (useful for grouping by network)
    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "wifi.ssid"
      rename = "ssid"

    # Scalar root fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uptime_s"
      type = "int"

    # wifi.* → fields named wifi_rssi_dbm, wifi_channel, wifi_tx_power_dbm
    # Excludes string fields (ssid, bssid) that are already tags or irrelevant
    [[inputs.mqtt_consumer.json_v2.object]]
      path                 = "wifi"
      disable_prepend_keys = false
      excluded_keys        = ["ssid", "bssid"]

    # latency.* → latency_gateway_avg_ms, latency_dns_avg_ms, etc.
    [[inputs.mqtt_consumer.json_v2.object]]
      path                 = "latency"
      disable_prepend_keys = false

    # packet_loss.* → packet_loss_percent, packet_loss_sent, packet_loss_received
    [[inputs.mqtt_consumer.json_v2.object]]
      path                 = "packet_loss"
      disable_prepend_keys = false

    # throughput.* → throughput_download_kbps
    [[inputs.mqtt_consumer.json_v2.object]]
      path                 = "throughput"
      disable_prepend_keys = false

# =============================================================================
# INPUT — Channel Scan Results  (topic: labwifimon/<probe_id>/scan)
# =============================================================================
# Expected JSON payload from ESP32:
# {
#   "probe_id":     "probe-01",
#   "timestamp_ms": 1700000000000,
#   "scan_duration_ms": 1200,
#   "count": 3,
#   "networks": [
#     {"ssid": "LabNet",   "bssid": "AA:BB:CC:DD:EE:FF", "rssi": -55, "channel": 6,  "encrypted": true},
#     {"ssid": "Guest",    "bssid": "BB:CC:DD:EE:FF:00", "rssi": -72, "channel": 11, "encrypted": true},
#     {"ssid": "IoT",      "bssid": "CC:DD:EE:FF:00:11", "rssi": -80, "channel": 1,  "encrypted": false}
#   ]
# }
# Produces measurement: wifi_scan
# Each element of the "networks" array becomes a separate metric point.
# Fields: rssi, channel, encrypted (from each array element)
# Tags:   probe_id (from topic), ssid, bssid (from each array element)
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics   = ["labwifimon/+/scan"]
  qos      = 0
  client_id           = "telegraf-scan"
  connection_timeout  = "30s"
  persistent_session  = false
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "labwifimon/+/scan"
    tags  = "_/probe_id/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "wifi_scan"
    # timestamp_path   = "timestamp_ms"
    # timestamp_format = "unix_ms"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "probe_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "scan_duration_ms"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "count"
      type = "int"

    # Each element of networks[] becomes its own metric.
    # String keys listed in "tags" become tag values; the rest become fields.
    [[inputs.mqtt_consumer.json_v2.object]]
      path                 = "networks"
      disable_prepend_keys = true   # field names: rssi, channel, encrypted (no prefix)
      tags                 = ["ssid", "bssid"]

# =============================================================================
# INPUT — Probe Status / Heartbeat  (topic: labwifimon/<probe_id>/status)
# =============================================================================
# Expected JSON payload from ESP32:
# {
#   "probe_id":        "probe-01",
#   "timestamp_ms":    1700000000000,
#   "status":          "online",
#   "firmware":        "1.2.3",
#   "ip_address":      "192.168.1.42",
#   "mac_address":     "A4:CF:12:78:4B:2E",
#   "free_heap_bytes": 210432,
#   "uptime_s":        3600,
#   "wifi_rssi_dbm":   -62,
#   "reset_reason":    "POWERON"
# }
# Produces measurement: probe_status
# Fields: free_heap_bytes, uptime_s, wifi_rssi_dbm
# Tags:   probe_id (from topic), status, firmware, ip_address
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics   = ["labwifimon/+/status"]
  qos      = 0
  client_id           = "telegraf-status"
  connection_timeout  = "30s"
  persistent_session  = false
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "labwifimon/+/status"
    tags  = "_/probe_id/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "probe_status"
    # timestamp_path   = "timestamp_ms"
    # timestamp_format = "unix_ms"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "probe_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "status"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "firmware"
      rename = "firmware_version"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "ip_address"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "free_heap_bytes"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uptime_s"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "wifi_rssi_dbm"
      type = "float"
