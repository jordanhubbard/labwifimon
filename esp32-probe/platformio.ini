; =============================================================================
; LabWiFiMon ESP32 Probe — PlatformIO Configuration
; Supports ESP32 Dev Module (primary) and ESP32-S3 DevKit
; =============================================================================

[platformio]
default_envs = esp32dev

; --- Shared settings ---------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient  @ ^2.8
    bblanchon/ArduinoJson   @ ^7.0
    marian-craciunescu/ESP32Ping @ ^1.0

; Decode stack traces from crashes, add colour to serial output
monitor_filters =
    esp32_exception_decoder
    colorize

; Increase the Arduino loop task stack from the default 8 KB.
; Metrics collection uses temporary buffers that can overflow the default.
build_flags =
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    -DCORE_DEBUG_LEVEL=0         ; 0=None, 1=Error, 2=Warn, 3=Info, 4=Debug
    -std=gnu++17

; --- ESP32 Dev Module --------------------------------------------------------
[env:esp32dev]
platform = espressif32
board     = esp32dev
build_flags =
    ${env.build_flags}
    -DSTATUS_LED_PIN=2           ; Built-in blue LED, active HIGH

; --- ESP32-S3 DevKitC-1 -----------------------------------------------------
; ESP32-S3 uses USB-CDC for serial output and an RGB LED (GPIO 48).
; The RGB LED requires a NeoPixel driver; we use a plain GPIO LED instead.
; Change STATUS_LED_PIN to whichever GPIO you've wired an external LED to.
[env:esp32-s3]
platform = espressif32
board     = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1  ; Route Serial to USB-CDC on S3
    -DSTATUS_LED_PIN=2           ; Use GPIO 2 (wire an external LED, or disable)

; --- ESP32-C5 DevKitC-1 ----------------------------------------------------
; ESP32-C5 is a RISC-V chip with WiFi 6 (2.4 + 5 GHz dual-band).
; Requires the pioarduino fork — the official espressif32 platform does not
; support the C5 yet.  Uses USB-CDC for serial (like the S3).
[env:esp32-c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-c5-devkitc-1
framework = arduino
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1         ; Use Hardware CDC (USB Serial/JTAG), not TinyUSB
    -DARDUINO_USB_CDC_ON_BOOT=1  ; Route Serial to USB-CDC on C5
    -DSTATUS_LED_PIN=2           ; Adjust to match your board's LED GPIO
